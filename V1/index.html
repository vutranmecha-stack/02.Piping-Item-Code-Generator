<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piping Material Code System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-container" id="appContainer">
    <header class="app-header">
        <h1>PIPING MATERIAL CODE GENERATOR</h1>
        <div id="licenseStatus" class="badge">Đang kiểm tra bản quyền...</div>
    </header>

    <div class="main-workspace">
        <div class="input-panel">
            <h3 class="panel-title">Data Input (11 Fields)</h3>
            
            <div class="grid-form">
                <div class="form-group"><label>1. Component</label><select id="f1_comp"></select></div>
                <div class="form-group"><label>2. S-Type</label><select id="f2_stype"></select></div>
                <div class="form-group"><label>3. Category Standard</label><select id="f3_catstd"></select></div>
                <div class="form-group"><label>4. End Connection</label><select id="f4_endconn"></select></div>
                <div class="form-group"><label>5. Rating</label><select id="f5_rating"></select></div>
                <div class="form-group"><label>6. Var.-Qualifier</label><select id="f6_varqual"></select></div>
                <div class="form-group col-span-2"><label>7. Material</label><select id="f7_material"></select></div>
                
                <div class="form-group"><label>8. Size 1 (DN)</label><select id="f8_size1"></select></div>
                <div class="form-group"><label>9. Size 2 (DN)</label><select id="f9_size2"></select></div>
                <div class="form-group"><label>10. Schedule 1</label><select id="f10_sch1"></select></div>
                <div class="form-group"><label>11. Schedule 2</label><select id="f11_sch2"></select></div>
            </div>

            <button id="btnGenerate" class="btn-primary">GENERATE ITEM CODE</button>
        </div>

        <div class="output-panel">
            <h3 class="panel-title">Generated Data</h3>
            
            <div class="output-group">
                <label>Item Code:</label>
                <div id="outItemCode" class="code-display">N/A</div>
            </div>
            
            <div class="output-group">
                <label>Description:</label>
                <div id="outDescription" class="desc-display">N/A</div>
            </div>
        </div>
    </div>
</div>

<div id="lockScreen" class="lock-screen hidden">
    <h2>⚠ PHẦN MỀM ĐÃ HẾT HẠN (EXPIRED)</h2>
    <p>Giấy phép sử dụng 1 tháng của bạn đã kết thúc. Vui lòng liên hệ quản trị viên.</p>
</div>

<script src="js/database.js"></script>
<script src="js/license.js"></script>
<script src="js/app.js"></script>

</body>
</html>
